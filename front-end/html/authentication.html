<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/auth_styles.css">
    <title>Aauthentication</title>
</head>

<body>
        <div class="wrapper">
            <div class="left_main_block ">
                <div class="logo_header">
                    <div class="logo_img_block">
                        <img class="logo_img" src="../img/photo_2025-01-25_22-09-20-Photoroom.png" alt="Company Logo">
                    </div>
                    <div class="controls_block">
                        <select id="authLanguageSelect">
                            <option value="uk">🇺🇦 UA</option>
                            <option value="en">🇬🇧 EN</option>
                            <option value="de">🇩🇪 DE</option>
                            <option value="pl">🇵🇱 PL</option>
                        </select>
                        <button id="authThemeToggle" class="theme-toggle">🌙</button>
                        <button class="home_page_btn" id="homePageBtn"><span>Home</span></button>
                    </div>
                </div>
                <!------------------------------- Registration block----------------------------------- -->
                <div class="main_block_for_all">
                    <div class="block_for_all_loading_animation inactive_loading_block" id="loadingBlock">
                        <div class="loading_main">
                           <div class="block_for_loading_animation ">
                             <video class="loading_animation" height="auto" autoplay="" muted="" playsinline="" loop="">
                            <source src="/img/loading_animation.webm" type="video/webm">
                            Logo don't opened
                             </video>
                           </div>
                        </div>
                    </div>


                <div class="main_block validRegLogForm auth_active" id="registratioBlock">
                    <div class="greeting_text_block">
                        <h3 class="greeting_text_01">Create an Account</h3>
                        <p class="greeting_text_02">Start your journey</p>
                    </div>
                        <div class="registration_sub_block">
                            <div class="registration_google_block">
                            <a href="/auth/google" class="google-btn">
                                <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                </svg>
                                <span>Sign up with Google</span>
                            </a>
                        </div>

                              
                    <div class="or_block">
                        <div class="block_for_line">
                            <h1 class="or_text">Or</h1>
                        </div>   
                    </div>
                    <div class="data_entry">
                        <form id="Registration_form" class="regAndlog_form">
                            <div class="form-container">
                            <input type="text" class="regAndlog_input" name="username" placeholder="Name" required>
               <input type="email" class="regAndlog_input" name="email" placeholder="Email" id="regAndlog_input" required>
                     
                                <!-- Ваше поле для пароля -->
                                <input type="password" id="regPassword" class="regAndlog_input " name="password" placeholder="Password" required>
                                <!-- Кнопка для видимості пароля -->
                                <div class="reg_password_visibility_btn"></div>
                            </div>
                            <div class="block_for_answer_reg"></div>

                            <div class="block_for_remember">
                                <label class="Check_remember">
                                    <input type="checkbox" name="remember" id="rememberMeReg">
                                    Remember me
                                </label>
                            </div>     

                            <button class="regAndlog_main_btn" id="register_btn"><span>Register</span></button>
                        </form>
                    </div>
                    <div class="logAndreg_btn_block">
                        <h1 class="logAndreg_text">Already have an account?  <button class="logAndreg_btn" id="openLogIn">Log in</button></h1>
                    </div>
                </div>
                </div>
                <!------------------------------------- Log In block ------------------------------------->
                <div class="main_block invalidRegLogForm auth_inactive" id="loginBlock">
                    <div class="greeting_text_block">
                        <h3 class="greeting_text_01">Log In your Account</h3>
                        <p class="greeting_text_02">Сontinue your journey</p>
                    </div>
                    <div class="login_google_block">
                          <a href="/auth/google" class="google-btn">
                                <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                </svg>
                        <span>Sign in with Google</span>
                      </a>
                    </div>
                  

                    <div class="or_block">
                        <div class="block_for_line">
                            <h1 class="or_text">Or</h1>
                        </div>   
                    </div>
                    <div class="data_entry">
                        <form id="Login_form" class="regAndlog_form">
                            <div class="form-container">
                            <input type="email" class="regAndlog_input" name="email" placeholder="Email" required>
                            <input type="password" id="logPassword" class="regAndlog_input" name="password" placeholder="Password" required>
                            <div class="log_password_visibility_btn"></div>
                        </div>

                            <div class="block_for_answer_log"></div>

                            <div class="block_for_remember">
                                <label class="Check_remember">
                                    <input type="checkbox" name="remember" id="rememberMeLog">
                                    Remember me
                                </label>
                            </div>  
                            
                                        
                            <button class="regAndlog_main_btn" id="login_btn"><span>Login</span></button>
                        </form>
                    </div>
                    <div class="block_for_sub">
                        <div class="block_for_reset_password">
                            <h1 class="text_reset_password">Forgot your password? <button class="reset_password_btn" id="resetPassword">Reset it now</button></h1>
                        </div>
                        <div class="logAndreg_btn_block">
                            <h1 class="logAndreg_text">Don't have an account yet? <button class="logAndreg_btn" id="openRegister">Register</button></h1>
                        </div>
                    </div>
                </div>
                <!------------------------------------- Reset Password block ------------------------------------->
                <div class="reset_password_block main_block auth_inactive">
                    <div class="reset_password_main">
                        <div class="rp_header">
                            <div class="rp_block_for_img">
                                <div class="rp_block_img">
                                    <img class="rp_img" src="../img/reset_password.png" alt="">
                                </div>
                            </div>
                            <div class="rp_block_for_text">
                                <h2 class="rp_header_text_01">Forgot your Password?</h2>
                                <p class="rp_header_text_02">Enter your email to reset it!</p>
                            </div>
                        </div>
                        <div class="reset_password_footer">
                            <p class="rp_footer_text_01">Email</p>
                            <form id="Resent_Password_Form" class="rp_footer_form" >
                                <input type="email" class="rp_footer_email" name="resentPasswordEmail" placeholder="Enter your email" required> 
                                <div class="rp_footer_block_for_answer"></div>
                                <button id="confirmResentPasswordBtn" class="rp_footer_confirm_btn">Confirm</button>
                                <div class="block_for_resend_code">
                                    <span class="rp_footer_send_code_again">Didn’t get the code? <button id="tryAgainResentPasswordBtn" disabled class="rp_footer_try_again_btn">Try again <span class="try_again_span"></span></button></span>
                                </div>
                               
                            </form>
                            <div class="rp_footer_block_return_to_login">
                                <div class="rp_footer_return_img_block_btn"><img src="../img/left_arrow_reset_password.png" class="rp_footer_return_img_btn" alt=""></div>
                                <button id="returnBtn" class="rp_footer_return_btn">Return back to login form</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
               
            </div>
            <div class="right_main_block">
                <img src="" alt="Background Image" class="right_main_img">
            </div>
            <div class="shadow_block_01"></div>
            <div class="shadow_block_02"></div>
            <div class="shadow_block_03"></div>

       
        </div>

<script type="module" src="/js/auth_fr.js"></script>
</script>
</body>
</html>
