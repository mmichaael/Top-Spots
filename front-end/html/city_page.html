<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Place</title>
    <link rel="stylesheet" href="../styles/city_page.css">
</head>
<body>

    <!-- Фонові сфери -->
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <!-- ══ ФОТО-СЛАЙДЕР ══════════════════════════════════════════ -->
    <section id="photo-slider" class="hidden" aria-label="Place photos">
        <div id="slides"></div>
        <button class="slide-btn slide-prev" aria-label="Previous photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>
        <button class="slide-btn slide-next" aria-label="Next photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M9 18l6-6-6-6"/>
            </svg>
        </button>
        <div id="dot-wrap" role="tablist" aria-label="Photo navigation"></div>
    </section>

    <!-- ══ HERO — PLACE NAME ══════════════════════════════════════════ -->
    <header class="place-hero">
        <h1 id="place-name" class="fade-up-1">Loading…</h1>
        <p  id="address"    class="fade-up-2"></p>
        <div id="rating" class="hidden fade-up-3" role="img" aria-label="Рейтинг"></div>
    </header>

    <!-- ══ MAP ════════════════════════════════════════════════ -->
    <section class="map-section reveal" aria-label="Map">
        <div id="map"></div>
    </section>

    <!-- ══ REVIEWS ══════════════════════════════════════════════ -->
    <section id="reviews-section" class="page-section hidden" aria-label="Reviews">
        <div class="section-head">
            <div>
                <p class="section-eyebrow">Traveler reviews</p>
                <h2 class="section-title">Reviews</h2>
            </div>
            <div class="arrow-btns">
                <button class="arrow-btn arrow-prev" aria-label="Scroll left">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button class="arrow-btn arrow-next" aria-label="Scroll right">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>
        </div>
        <div id="reviews" class="scroll-track" role="list"></div>
    </section>

    <!-- ══ NEARBY ════════════════════════════════════════════════ -->
    <section id="nearby-section" class="page-section hidden" aria-label="Nearby">
        <div class="section-head">
            <div>
                <p class="section-eyebrow">Explore Nearby</p>
                <h2 class="section-title">Nearby</h2>
            </div>
            <div class="arrow-btns">
                <button class="arrow-btn arrow-prev" aria-label="Scroll left">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button class="arrow-btn arrow-next" aria-label="Scroll right">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>
        </div>
        <div id="nearby-list" class="scroll-track" role="list"></div>
    </section>

    <!-- ══ ФУТЕР (не чіпаємо) ════════════════════════════════════ -->
    <footer id="site-footer">
        <!-- твій футер -->
    </footer>

    <script src="../js/city.js"></script>
</body>
</html>
