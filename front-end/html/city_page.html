<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Місце</title>
    <link rel="stylesheet" href="../styles/city_page.css">
</head>
<body>

    <!-- Фонові сфери -->
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <!-- ══ ФОТО-СЛАЙДЕР ══════════════════════════════════════════ -->
    <section id="photo-slider" class="hidden" aria-label="Фотографії місця">
        <div id="slides"></div>
        <button class="slide-btn slide-prev" aria-label="Попереднє фото">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>
        <button class="slide-btn slide-next" aria-label="Наступне фото">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M9 18l6-6-6-6"/>
            </svg>
        </button>
        <div id="dot-wrap" role="tablist" aria-label="Навігація по фото"></div>
    </section>

    <!-- ══ HERO — НАЗВА ══════════════════════════════════════════ -->
    <header class="place-hero">
        <h1 id="place-name" class="fade-up-1">Завантаження…</h1>
        <p  id="address"    class="fade-up-2"></p>
        <div id="rating" class="hidden fade-up-3" role="img" aria-label="Рейтинг"></div>
    </header>

    <!-- ══ КАРТА ════════════════════════════════════════════════ -->
    <section class="map-section reveal" aria-label="Карта">
        <div id="map"></div>
    </section>

    <!-- ══ ВІДГУКИ ══════════════════════════════════════════════ -->
    <section id="reviews-section" class="page-section hidden" aria-label="Відгуки">
        <div class="section-head">
            <div>
                <p class="section-eyebrow">Думки мандрівників</p>
                <h2 class="section-title">Відгуки</h2>
            </div>
            <div class="arrow-btns">
                <button class="arrow-btn arrow-prev" aria-label="Прокрутити ліворуч">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button class="arrow-btn arrow-next" aria-label="Прокрутити праворуч">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>
        </div>
        <div id="reviews" class="scroll-track" role="list"></div>
    </section>

    <!-- ══ NEARBY ════════════════════════════════════════════════ -->
    <section id="nearby-section" class="page-section hidden" aria-label="Поряд">
        <div class="section-head">
            <div>
                <p class="section-eyebrow">Досліджуй поряд</p>
                <h2 class="section-title">Поряд з вами</h2>
            </div>
            <div class="arrow-btns">
                <button class="arrow-btn arrow-prev" aria-label="Прокрутити ліворуч">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button class="arrow-btn arrow-next" aria-label="Прокрутити праворуч">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>
        </div>
        <div id="nearby-list" class="scroll-track" role="list"></div>
    </section>

    <!-- ══ ФУТЕР (не чіпаємо) ════════════════════════════════════ -->
    <footer id="site-footer">
        <!-- твій футер -->
    </footer>

    <script src="../js/city.js"></script>
</body>
</html>
